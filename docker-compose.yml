services:
  db:
    image: postgres:15
    container_name: news_postgres
    restart: always
    environment:
      POSTGRES_USER: ${USERNAME}
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - /home/aryhsg/News_summary_helper/infrastructure/news_database/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nsh_network

  redis:
    image: redis:7-alpine
    container_name: news_redis
    restart: always
    volumes:
      - /home/aryhsg/News_summary_helper/infrastructure/news_database/redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nsh_network

  web:
    build: .
    container_name: nsh_backend_web
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nsh_network
    command:
      [
        "gunicorn",
        "--workers",
        "1",
        "--worker-class",
        "uvicorn.workers.UvicornWorker",
        "--bind",
        "0.0.0.0:8000",
        "main_apps:web_app",
      ]

  line:
    build: .
    container_name: nsh_backend_line
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nsh_network
    command:
      [
        "gunicorn",
        "--workers",
        "1",
        "--worker-class",
        "uvicorn.workers.UvicornWorker",
        "--bind",
        "0.0.0.0:5000",
        "main_apps:line_app",
      ]

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/aryhsg/News_summary_helper/infrastructure/news_database/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/aryhsg/News_summary_helper/infrastructure/news_database/nginx:/etc/nginx/ssl:ro
      - /var/www/nsh_frontend/:/usr/share/nginx/html:ro
    networks:
      - nsh_network
    depends_on:
      - web
      - line

networks:
  nsh_network:
    driver: bridge
