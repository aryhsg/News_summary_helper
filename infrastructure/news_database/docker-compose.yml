services:
  db:
    image: postgres:15
    container_name: news_postgres
    restart: always
    environment:
      POSTGRES_USER: aryhsg
      POSTGRES_PASSWORD: aryhsg1520
      POSTGRES_DB: news_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /home/aryhsg/News_summary_helper/infrastructure/news_database/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aryhsg -d news_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: news_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - /home/aryhsg/News_summary_helper/infrastructure/news_database/redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx:/etc/nginx/ssl:ro
      - /var/www/nsh_frontend/:/usr/share/nginx/html:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
